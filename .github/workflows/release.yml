name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Test
        run: go test ./...
      - name: Generate command docs
        run: go run ./scripts/generate-command-docs
      - name: Build all targets
        run: make build-all
      - name: Checksums
        shell: bash
        run: |
          cd dist
          sha256sum * > checksums.txt
      - name: Optional keyless signing
        if: env.COSIGN_EXPERIMENTAL == 'true'
        uses: sigstore/cosign-installer@v3
      - name: Sign checksums
        if: env.COSIGN_EXPERIMENTAL == 'true'
        shell: bash
        run: cosign sign-blob --yes dist/checksums.txt --output-signature dist/checksums.txt.sig
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
