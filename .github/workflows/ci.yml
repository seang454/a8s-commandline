name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Format check
        shell: bash
        run: |
          test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Generate command docs
        run: go run ./scripts/generate-command-docs
      - name: Check generated docs
        shell: bash
        run: |
          git diff --exit-code -- docs/command-reference.md docs/commands
          test -z "$(git status --porcelain docs/command-reference.md docs/commands)"

  build:
    name: Build release binaries
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build all targets
        run: make build-all
      - name: Checksums
        shell: bash
        run: |
          cd dist
          sha256sum * > checksums.txt
      - uses: actions/upload-artifact@v4
        with:
          name: a8s-binaries
          path: dist/
